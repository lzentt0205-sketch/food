<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化美食拉霸 3D 完美校對版 v2.5.0</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #f2f7f2;
            --primary-green: #66bb6a;
            --wood-brown: #5d4037;
            --accent-green: #a5d6a7;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            user-select: none;
            transition: background-color 0.5s ease;
        }

        body.win-bg {
            background-color: #e8f5e9;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            z-index: 10;
        }

        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 25px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            backdrop-filter: blur(10px);
            border: 2px solid var(--wood-brown);
        }

        .version-tag {
            background: var(--wood-brown);
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--wood-brown);
        }

        .controls {
            position: absolute;
            bottom: 40px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-spin {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 18px 55px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #43a047;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #43a047;
        }

        .btn-spin:disabled {
            background: #cbd5e0;
            box-shadow: 0 6px 0 #a0aec0;
            cursor: not-allowed;
            color: #718096;
        }

        #result-area {
            position: absolute;
            top: 48%;
            transform: translateY(-50%);
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 20;
        }

        #result-area.show {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
        }

        .result-badge {
            background: var(--wood-brown);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 3px solid var(--accent-green);
        }

        .dancer-container {
            position: absolute;
            bottom: 100px;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
        }

        .dancer {
            font-size: 4.5rem;
            user-select: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }

        @keyframes dance-idle {
            0%, 100% { transform: translateY(0) rotate(-8deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }

        @keyframes dance-crazy {
            0% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-40px) scale(1.3) rotate(15deg); }
            100% { transform: translateY(0) scale(1.1); }
        }

        @keyframes dance-win {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.6) translateY(-100px) rotate(360deg); }
            100% { transform: scale(1) translateY(0); }
        }

        .idle { animation: dance-idle 2s infinite ease-in-out; }
        .active { animation: dance-crazy 0.3s infinite ease-in-out; }
        .win { animation: dance-win 0.7s infinite ease-out; }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* 輔助中心對齊線 */
        .center-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7.5rem;
            height: 2px;
            background: rgba(102, 187, 106, 0.4);
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="center-line" id="guideLine"></div>

    <div id="ui-overlay">
        <div class="header">
            <div class="version-tag">V2.5.0 SYNC FIX</div>
            <h1>🍱 文化美食精確拉霸</h1>
        </div>

        <div class="dancer-container">
            <div id="dancerL" class="dancer idle">🦊</div>
            <div id="dancerR" class="dancer idle">🐻</div>
        </div>

        <div id="result-area">
            <div class="result-badge" id="result-label"></div>
        </div>

        <div class="controls">
            <button class="btn-spin" id="spin-btn" onclick="startSpin()">
                <span>🎰</span> 啟動拉霸
            </button>
            <div style="font-size: 0.8rem; color: #777; pointer-events: none;">已修復字圖同步問題，完美精確對齊</div>
        </div>
    </div>

    <audio id="soundSpin" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" preload="auto"></audio>
    <audio id="soundWin" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <script>
        // 定義美食資料
        const foodData = [
            { emoji: "🍲", name: "火鍋" },
            { emoji: "🇰🇷", name: "韓式" },
            { emoji: "🍝", name: "義大利麵" },
            { emoji: "🍛", name: "咖哩飯" },
            { emoji: "🥩", name: "牛排" },
            { emoji: "🌶️", name: "麻辣燙" },
            { emoji: "🍚", name: "丼飯" },
            { emoji: "🏫", name: "學餐" },
            { emoji: "🍱", name: "自助餐" },
            { emoji: "🥟", name: "水餃" },
            { emoji: "🚚", name: "餐車" },
            { emoji: "🍜", name: "麵類" }
        ];

        let scene, camera, renderer, reelGroup;
        let isSpinning = false;
        let currentRotation = 0;
        let targetRotation = 0;
        let selectedIdx = 0;

        const ITEM_COUNT = foodData.length;
        const RADIUS = 4.2; 
        const STEP = (Math.PI * 2) / ITEM_COUNT;

        window.onload = () => {
            initScene();
            renderLoop();
        };

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf2f7f2);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);

            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(0, 10, 10);
            scene.add(light);

            // 拉霸機外殼
            const shellGeo = new THREE.BoxGeometry(9.2, 8.5, 6.0);
            const shellMat = new THREE.MeshPhongMaterial({ color: 0x5d4037 });
            const shell = new THREE.Mesh(shellGeo, shellMat);
            shell.position.z = -2.0;
            scene.add(shell);

            // 內視窗背景
            const innerGeo = new THREE.PlaneGeometry(6.5, 9.0);
            const innerMat = new THREE.MeshBasicMaterial({ color: 0x0a0a0a });
            const inner = new THREE.Mesh(innerGeo, innerMat);
            inner.position.z = -RADIUS + 0.2; 
            scene.add(inner);

            // 建立滾輪組
            reelGroup = new THREE.Group();
            scene.add(reelGroup);

            foodData.forEach((item, i) => {
                // 每個項目的初始角度
                const angle = i * STEP;
                
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                
                // 繪製背景
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(10, 10, 492, 180, 40);
                else ctx.rect(10, 10, 492, 180);
                ctx.fill();
                
                // 繪製文字
                ctx.fillStyle = '#3e2723';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 95px "PingFang TC"';
                ctx.fillText(`${item.emoji} ${item.name}`, 256, 105);
                
                const tex = new THREE.CanvasTexture(canvas);
                tex.flipY = true; // 確保字體不顛倒
                
                const mat = new THREE.MeshPhongMaterial({ 
                    map: tex, 
                    transparent: true, 
                    side: THREE.DoubleSide 
                });
                
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(5.4, 2.0), mat);
                
                // 重要：在圓環上的排列位置與角度
                // 索引 0 將位於 (0, 0, RADIUS)
                plane.position.y = Math.sin(angle) * RADIUS;
                plane.position.z = Math.cos(angle) * RADIUS;
                plane.rotation.x = angle; 
                
                reelGroup.add(plane);
            });

            // 視角旋轉互動
            let isDown = false, lastX = 0;
            const onDown = (x) => { isDown = true; lastX = x; };
            const onMove = (x) => { if(isDown) { scene.rotation.y += (x - lastX) * 0.005; lastX = x; } };
            const onUp = () => { isDown = false; };

            window.addEventListener('mousedown', e => onDown(e.clientX));
            window.addEventListener('mousemove', e => onMove(e.clientX));
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchstart', e => onDown(e.touches[0].clientX));
            window.addEventListener('touchmove', e => onMove(e.touches[0].clientX));
            window.addEventListener('touchend', onUp);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function startSpin() {
            if (isSpinning) return;

            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('result-area').classList.remove('show');
            document.getElementById('guideLine').style.display = 'none';
            document.body.classList.remove('win-bg');
            
            document.getElementById('dancerL').className = "dancer active";
            document.getElementById('dancerR').className = "dancer active";

            document.getElementById('soundSpin').currentTime = 0;
            document.getElementById('soundSpin').play().catch(()=>{});

            // 隨機選中索引
            selectedIdx = Math.floor(Math.random() * ITEM_COUNT);
            
            // 正規化目前旋轉角度
            currentRotation %= (Math.PI * 2);
            
            const baseRounds = 8; // 旋轉圈數
            
            // 完美對齊核心邏輯：
            // 項目 i 的角度是 i * STEP。
            // 若要讓項目 i 回到正面 (Z軸正向)，reelGroup 的 rotation.x 必須等於 - (i * STEP)。
            // 為了讓滾輪向下捲動，我們需要不斷減小 rotation.x。
            
            const targetPos = -(selectedIdx * STEP);
            const currentNorm = currentRotation;
            
            // 計算到達目標所需的位移，確保是負向增加 (向下轉)
            let diff = targetPos - currentNorm;
            while (diff > 0) diff -= (Math.PI * 2);
            
            targetRotation = currentRotation + diff - (baseRounds * Math.PI * 2);
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            
            if (isSpinning) {
                const delta = targetRotation - currentRotation;
                // 平滑緩動
                currentRotation += delta * 0.045;

                if (Math.abs(delta) < 0.0001) {
                    currentRotation = targetRotation;
                    isSpinning = false;
                    finishSpin();
                }
            }

            reelGroup.rotation.x = currentRotation;
            renderer.render(scene, camera);
        }

        function finishSpin() {
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('soundWin').currentTime = 0;
            document.getElementById('soundWin').play().catch(()=>{});
            
            document.body.classList.add('win-bg');
            document.getElementById('dancerL').className = "dancer win";
            document.getElementById('dancerR').className = "dancer win";
            document.getElementById('guideLine').style.display = 'block';

            const winner = foodData[selectedIdx];
            document.getElementById('result-label').innerText = `✨ 恭喜抽中：${winner.name} ✨`;
            document.getElementById('result-area').classList.add('show');

            popConfetti();

            setTimeout(() => {
                if(!isSpinning) {
                    document.getElementById('dancerL').className = "dancer idle";
                    document.getElementById('dancerR').className = "dancer idle";
                    document.getElementById('guideLine').style.display = 'none';
                }
            }, 5000);
        }

        function popConfetti() {
            const palette = ['#ff7043', '#ffeb3b', '#4caf50', '#29b6f6', '#ec407a'];
            for (let i = 0; i < 70; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];
                c.style.width = Math.random() * 10 + 5 + 'px';
                c.style.height = c.style.width;
                c.style.animation = `confetti-fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4500);
            }
        }
    </script>
</body>
</html>
